version: '3.9'

services:
  # =============================================================================
  # systemd Service Monitor Application
  # =============================================================================
  systemd-monitor:
    image: systemd-monitor:latest
    container_name: systemd-monitor
    restart: always

    # Network configuration
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=https://0.0.0.0:5001

    # Volume mounts for D-Bus and journal access
    volumes:
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
      - /var/log/journal:/var/log/journal:ro
      - /sys:/sys:ro
      - /proc:/proc:ro
      - systemd-monitor-logs:/app/logs
      - ./appsettings.production.json:/app/appsettings.Production.json:ro

    # Security configuration
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

    # Labels for monitoring
    labels:
      - "prometheus-job=systemd-monitor"
      - "app=systemd-monitor"

  # =============================================================================
  # PostgreSQL Database (Optional - for production metrics storage)
  # =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: systemd-monitor-db
    restart: always

    environment:
      POSTGRES_DB: systemd_monitor
      POSTGRES_USER: systemd_monitor
      POSTGRES_PASSWORD: change_me_in_production
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=en_US.UTF-8

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db-init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U systemd_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - systemd-monitor-network

  # =============================================================================
  # Nginx Reverse Proxy (Optional - for production HTTPS)
  # =============================================================================
  nginx:
    image: nginx:alpine
    container_name: systemd-monitor-nginx
    restart: always

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nginx-cache:/var/cache/nginx

    depends_on:
      - systemd-monitor

    networks:
      - systemd-monitor-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Prometheus Exporter (Optional - for metrics collection)
  # =============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: systemd-monitor-prometheus
    restart: always

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

    ports:
      - "9090:9090"

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

    depends_on:
      - systemd-monitor

    networks:
      - systemd-monitor-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  systemd-monitor-logs:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  nginx-cache:
    driver: local

networks:
  systemd-monitor-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
